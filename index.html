<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>3D Heart Galaxy - Surprise</title>

    <style>

        /* MÀN HÌNH CHÀO ĐỂ KÍCH HOẠT NHẠC */

        #overlay {

            background: rgba(0, 0, 0, 0.9);

            display: flex; flex-direction: column; justify-content: center; align-items: center;

            z-index: 1000; cursor: pointer; transition: opacity 1s ease;

        }

        #overlay h2 { color: #ff4d4d; text-shadow: 0 0 15px #ff2121; letter-spacing: 5px; }

        #overlay p { color: white; font-size: 14px; opacity: 0.6; margin-top: 20px; }



        #my-photo {

            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);

            max-width: 80%; max-height: 80%; border-radius: 20px;

            box-shadow: 0 0 60px #ff2121; opacity: 0; transition: 0.8s;

            z-index: 5; border: 4px solid white; pointer-events: none;

        }

    </style>

</head>
