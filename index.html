<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>3D Heart Galaxy - Music Integrated</title>

<style>
body { 
    margin: 0; 
    overflow: hidden; 
    background: linear-gradient(to bottom, #000000 0%, #050b1a 40%, #1a2a4a 70%, #4a1a4a 100%);
    font-family: sans-serif; 
    cursor: pointer;
}
canvas { display: block; }

#status {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #ff4d4d; font-size: 13px; letter-spacing: 2px; z-index: 10;
    text-shadow: 0 0 10px #ff2121; opacity: 0.8; text-align: center;
}

#my-photo {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: 80%; max-height: 80%; border-radius: 20px;
    box-shadow: 0 0 60px #ff2121; opacity: 0; transition: 0.8s;
    z-index: 5; border: 4px solid white; pointer-events: none;
}

/* INTRO SCREEN */
#intro-screen{
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#intro-text{
    color:white;
    font-size:70px;
    font-weight:bold;
    letter-spacing:6px;
    animation: blink 1s infinite;
}

@keyframes blink{
    0%{ opacity:1; }
    50%{ opacity:0.2; }
    100%{ opacity:1; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro-screen">
    <div id="intro-text">CLICK !!!</div>
</div>

<div id="status">TỚ CÓ QUÀ CHO CẬU NÈ ❤️</div>
<img id="my-photo" src="1.jpg">

<audio id="bg-music" loop preload="auto">
    <source src="tt.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* SAO NỀN */
const starCount = 1200;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
    starPos[i*3] = (Math.random()-0.5)*150;
    starPos[i*3+1] = (Math.random()-0.5)*150;
    starPos[i*3+2] = (Math.random()-0.5)*150;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
scene.add(new THREE.Points(starGeo, starMat));

/* MƯA SAO */
  const meteors = [];
        function createMeteor() {
            const geometry = new THREE.BufferGeometry();
            const length = Math.random() * 2 + 1;
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, -length, length, 0]), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array([1,1,1, 0,0,0]), 3));
            const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, blending: THREE.AdditiveBlending }));
            line.position.set((Math.random()-0.8)*80, Math.random()*40+5, (Math.random()-0.5)*30);
            return { mesh: line, speed: Math.random() * 0.012 + 0.005 };
        }
        for (let i = 0; i < 150; i++) {
            const m = createMeteor();
            meteors.push(m);
            scene.add(m.mesh);
        }

/* TRÁI TIM */
const particleCount = 15000;
const heartGeo = new THREE.BufferGeometry();
const hPos = new Float32Array(particleCount * 3);
const hCols = new Float32Array(particleCount * 3);
let c = 0;
while (c < particleCount) {
    let x=(Math.random()-0.5)*3, y=(Math.random()-0.5)*3, z=(Math.random()-0.5)*3;
    let f=Math.pow(x*x+(9/4)*y*y+z*z-1,3)-x*x*Math.pow(z,3)-(9/80)*y*y*Math.pow(z,3);
    if (f<=0) {
        hPos[c*3]=x; hPos[c*3+1]=z; hPos[c*3+2]=y;
        hCols[c*3]=1; hCols[c*3+1]=Math.random()*0.1; hCols[c*3+2]=Math.random()*0.2;
        c++;
    }
}
heartGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
heartGeo.setAttribute('color', new THREE.BufferAttribute(hCols, 3));
const heartCloud = new THREE.Points(
    heartGeo, 
    new THREE.PointsMaterial({ size: 0.018, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 })
);
scene.add(heartCloud);
camera.position.z = 4;

/* ANIMATION */
let time = 0, visible = false;
const photo = document.getElementById('my-photo');
const music = document.getElementById('bg-music');
let musicStarted = false;

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    if (!visible) {
        let s = 1 + Math.sin(time * 1.2) * 0.04;
        heartCloud.scale.set(s, s, s);
        heartCloud.rotation.y += 0.002;
    }

    meteors.forEach(m => {
        m.mesh.position.x += m.speed * 1.8; 
        m.mesh.position.y -= m.speed;
        if (m.mesh.position.y < -20 || m.mesh.position.x > 40) m.reset();
    });

    renderer.render(scene, camera);
}
animate();

/* CLICK INTRO */
const introScreen = document.getElementById("intro-screen");

introScreen.addEventListener("click", () => {
    introScreen.style.transition = "0.8s";
    introScreen.style.opacity = "0";
    setTimeout(()=>{ introScreen.style.display = "none"; },800);

    if (!musicStarted) {
        music.play().then(()=>{ musicStarted = true; });
    }
});

/* CLICK TIM */
window.addEventListener('click', (e) => {
    if (introScreen.style.display !== "none") return;

    const mouse = new THREE.Vector2(
        (e.clientX/window.innerWidth)*2-1,
        -(e.clientY/window.innerHeight)*2+1
    );

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    if (raycaster.intersectObject(heartCloud).length > 0 && !visible) {
        visible = true;
        photo.style.opacity = 1;
        heartCloud.visible = false;
    } else if (visible) {
        visible = false;
        photo.style.opacity = 0;
        heartCloud.visible = true;
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
