<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<title>3D Heart Galaxy - Music Integrated</title>



<style>

body { 

    margin: 0; 

    overflow: hidden; 

    background: linear-gradient(to bottom, #000000 0%, #050b1a 40%, #1a2a4a 70%, #4a1a4a 100%);

    font-family: sans-serif; 

    cursor: pointer;

}

canvas { display: block; }



#status {

    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);

    color: #ff4d4d; font-size: 13px; letter-spacing: 2px; z-index: 10;

    text-shadow: 0 0 10px #ff2121; opacity: 0.8; text-align: center;

}



#my-photo {

    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);

    max-width: 80%; max-height: 80%; border-radius: 20px;

    box-shadow: 0 0 60px #ff2121; opacity: 0; transition: 0.8s;

    z-index: 5; border: 4px solid white; pointer-events: none;

}



/* INTRO SCREEN */

#intro-screen{

    position: fixed;

    top:0; left:0;

    width:100%; height:100%;

    background:black;

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:999;

}



#intro-text{

    color:white;

    font-size:70px;

    font-weight:bold;

    letter-spacing:6px;

    animation: blink 1s infinite;

}



@keyframes blink{

    0%{ opacity:1; }

    50%{ opacity:0.2; }

    100%{ opacity:1; }

}

</style>

</head>



<body>

<img id="my-photo" src="1.jpg">



<audio id="bg-music" loop preload="auto">

    <source src="tt.mp3" type="audio/mpeg">

</audio>
